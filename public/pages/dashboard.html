<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">

<style>
body { margin:0; display:flex; font-family:Arial; }
.sidebar { width:220px; background:#2c3e50; color:white; height:100vh; }
.menu-item { padding:15px; cursor:pointer; }
.menu-item:hover { background:#34495e; }
.submenu { display:none; background:#34495e; }
.submenu div { padding:10px 30px; cursor:pointer; }

.content { flex:1; padding:20px; background:#f4f6f9; }
.hidden { display:none; }

table { width:100%; background:white; border-collapse:collapse; }
td, th { padding:10px; border:1px solid #ddd; }

textarea { width:100%; height:60px; }
.card { padding:20px; color:white; border-radius:8px; }
input, select { margin:5px 0; padding:5px; width:100%; }
button { margin-top:5px; padding:5px; cursor:pointer; }
</style>
</head>

<body>

<div class="sidebar">
<div class="menu-item" onclick="mostrarTela('dashboard')">Dashboard</div>
<div class="menu-item" onclick="mostrarTela('chamados')">Chamados</div>

<div class="menu-item" onclick="toggleSubmenu()">Cadastros ▼</div>
<div class="submenu" id="submenu">
<div onclick="mostrarTela('usuarios')">Usuários</div>
<div onclick="mostrarTela('setores')">Setores</div>
</div>

<div class="menu-item" onclick="toggleEquip()">Equipamentos ▼</div>
<div class="submenu" id="submenuEquip">
<div onclick="mostrarTela('pcs')">PC</div>
<div onclick="mostrarTela('pecas')">Peças</div>
</div>

<div class="menu-item" onclick="logout()">Sair</div>
</div>

<div class="content">

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>

<div style="display:flex; gap:20px;">
<div class="card" style="background:#3498db">
<h3>Usuários</h3>
<p id="totalUsuarios">0</p>
</div>

<div class="card" style="background:#2ecc71">
<h3>Setores</h3>
<p id="totalSetores">0</p>
</div>
</div>

<h3>⚠️ Chamados Vencidos</h3>
<table><tbody id="listaAlertas"></tbody></table>
</div>

<!-- USUÁRIOS -->
<div id="usuarios" class="hidden">
<h2>Usuários</h2>
<input id="novoUsuario" placeholder="Usuário">
<button onclick="cadastrarUsuario()">Cadastrar</button>
<table><tbody id="listaUsuarios"></tbody></table>
</div>

<!-- SETORES -->
<div id="setores" class="hidden">
<h2>Setores</h2>
<input id="novoSetor" placeholder="Setor">
<button onclick="cadastrarSetor()">Cadastrar</button>
<table><tbody id="listaSetores"></tbody></table>
</div>

<!-- CHAMADOS -->
<div id="chamados" class="hidden">
<h2>Chamados</h2>

<select id="tomboSelect"></select>
<select id="setorSelect"></select>
<select id="usuarioSelect"></select>

<input id="mac" placeholder="MAC">
<textarea id="problema" placeholder="Problema"></textarea>
<textarea id="acao" placeholder="Ação"></textarea>

<input type="date" id="dataAcao">
<input type="date" id="dataAtualizacao">
<input type="number" id="dias" placeholder="Dias revisão">

<button onclick="cadastrarChamado()">Cadastrar</button>

<table><tbody id="listaChamados"></tbody></table>
</div>

<!-- PCS -->
<div id="pcs" class="hidden">
<h2>Cadastro de PC</h2>

<input id="sistema" placeholder="Sistema Operacional">
<input id="placaMae" placeholder="Placa Mãe">
<input id="processador" placeholder="Processador">
<input id="memoria" placeholder="Memória">
<input id="armazenamento" placeholder="Armazenamento">
<input id="fonte" placeholder="Fonte">

<button onclick="cadastrarPC()">Cadastrar</button>

<table><tbody id="listaPC"></tbody></table>
</div>

<!-- PEÇAS -->
<div id="pecas" class="hidden">
<h2>Cadastro de Peças</h2>

<input id="nomePeca" placeholder="Nome">
<input id="descPeca" placeholder="Descrição do Produto">

<button onclick="cadastrarPeca()">Cadastrar</button>

<table><tbody id="listaPecas"></tbody></table>
</div>

</div>

<script>
const token = localStorage.getItem('token');
if (!token) location.href='/login';

function toggleSubmenu(){
submenu.style.display=submenu.style.display==='block'?'none':'block';
}

function toggleEquip(){
submenuEquip.style.display=submenuEquip.style.display==='block'?'none':'block';
}

function mostrarTela(t){
document.querySelectorAll('.content > div').forEach(d=>d.classList.add('hidden'));
document.getElementById(t).classList.remove('hidden');

if(t==='dashboard') carregarDashboard();
if(t==='usuarios') carregarUsuarios();
if(t==='setores') carregarSetores();
if(t==='chamados'){carregarSelects();carregarChamados();}
if(t==='pcs') carregarPC();
if(t==='pecas') carregarPecas();
}

//////////////// DASHBOARD
function carregarDashboard(){
fetch('/dashboard/usuarios',{headers:{Authorization:token}})
.then(r => {
    if (!r.ok) throw new Error('Erro na requisição');
    return r.json();
})
.then(d => totalUsuarios.textContent = d.total)
.catch(err => console.error(err));

fetch('/dashboard/setores',{headers:{Authorization:token}})
.then(r=>r.json()).then(d=>totalSetores.textContent=d.total);

fetch('/dashboard/alertas',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>{
listaAlertas.innerHTML=d.map(a=>`
<tr>
<td>${a._id}</td>
<td>${a.tombo}</td>
<td>${a.setor}</td>
<td>${a.usuario}</td>
<td style="color:red">${a.proxima_revisao}</td>
</tr>`).join('');
});
}

//////////////// USUÁRIOS
function carregarUsuarios(){
fetch('/usuarios',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>{
listaUsuarios.innerHTML=d.map(u=>`
<tr>
<td>${u._id}</td>
<td>${u.username}</td>
<td>${u.tipo}</td>
<td>
<button onclick="editarUsuario('${u._id}','${u.username}')">✏️</button>
<button onclick="excluirUsuario('${u._id}')">❌</button>
</td>
</tr>`).join('');
});
}

function cadastrarUsuario(){
fetch('/register',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({username:novoUsuario.value,password:'1234'})
}).then(()=>carregarUsuarios());
}

function editarUsuario(id,username){
const novo=prompt("Novo usuário:",username);
const senha=prompt("Senha:");
if(!novo||!senha)return;

fetch(`/usuarios/${id}`,{
method:'PUT',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({username:novo,password:senha})
}).then(()=>carregarUsuarios());
}

function excluirUsuario(id){
fetch(`/usuarios/${id}`,{method:'DELETE',headers:{Authorization:token}})
.then(()=>carregarUsuarios());
}

//////////////// SETORES
function carregarSetores(){
fetch('/setores',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>{
listaSetores.innerHTML=d.map(s=>`
<tr>
<td>${s._id}</td>
<td>${s.nome}</td>
<td>
<button onclick="editarSetor('${s._id}','${s.nome}')">✏️</button>
<button onclick="excluirSetor('${s._id}')">❌</button>
</td>
</tr>`).join('');
});
}

function cadastrarSetor(){
fetch('/setores',{
method:'POST',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({nome:novoSetor.value})
}).then(()=>carregarSetores());
}

function editarSetor(id,nome){
const novo=prompt("Novo nome:",nome);
if(!novo)return;

fetch(`/setores/${id}`,{
method:'PUT',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({nome:novo})
}).then(()=>carregarSetores());
}

function excluirSetor(id){
fetch(`/setores/${id}`,{method:'DELETE',headers:{Authorization:token}})
.then(()=>carregarSetores());
}

//////////////// CHAMADOS
function carregarSelects(){
fetch('/pcs',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>tomboSelect.innerHTML=d.map(x=>`<option value="${x.codigo}">${x.codigo}</option>`));

fetch('/setores',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>setorSelect.innerHTML=d.map(x=>`<option value="${x._id}">${x.nome}</option>`));

fetch('/usuarios',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>usuarioSelect.innerHTML=d.map(x=>`<option value="${x._id}">${x.username}</option>`));
}

function cadastrarChamado(){
fetch('/chamados',{
method:'POST',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({
tombo:tomboSelect.value,
setor_id:setorSelect.value,
usuario_id:usuarioSelect.value,
mac:mac.value,
problema:problema.value,
acao:acao.value,
data_acao:dataAcao.value,
data_atualizacao:dataAtualizacao.value,
dias_revisao:dias.value
})
}).then(()=>carregarChamados());
}

function carregarChamados(){
fetch('/chamados',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>{
listaChamados.innerHTML=d.map(c=>`
<tr>
<td>${c._id}</td>
<td>${c.tombo}</td>
<td>${c.setor}</td>
<td>${c.usuario}</td>
<td>${c.mac}</td>
<td>${c.problema}</td>
<td>${c.acao}</td>
<td>${c.proxima_revisao}</td>
<td><button onclick="excluirChamado('${c._id}')">❌</button></td>
</tr>`).join('');
});
}

function excluirChamado(id){
fetch(`/chamados/${id}`,{method:'DELETE',headers:{Authorization:token}})
.then(()=>carregarChamados());
}

//////////////// PCS
function cadastrarPC(){
fetch('/pcs',{
method:'POST',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({
sistema:sistema.value,
placaMae:placaMae.value,
processador:processador.value,
memoria:memoria.value,
armazenamento:armazenamento.value,
fonte:fonte.value
})
}).then(()=>carregarPC());
}

function carregarPC(){
fetch('/pcs',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>{
listaPC.innerHTML=d.map(p=>`
<tr>
<td>${p.codigo}</td>
<td>${p.sistema}</td>
<td>${p.placaMae}</td>
<td>${p.processador}</td>
<td>${p.memoria}</td>
<td>${p.armazenamento}</td>
<td>${p.fonte}</td>
<td><button onclick="excluirPC('${p._id}')">❌</button></td>
</tr>`).join('');
});
}

function excluirPC(id){
fetch(`/pcs/${id}`,{method:'DELETE',headers:{Authorization:token}})
.then(()=>carregarPC());
}

//////////////// PEÇAS
function cadastrarPeca(){
fetch('/pecas',{
method:'POST',
headers:{'Content-Type':'application/json',Authorization:token},
body:JSON.stringify({
nome:nomePeca.value,
descricao:descPeca.value
})
}).then(()=>carregarPecas());
}

function carregarPecas(){
fetch('/pecas',{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>{
listaPecas.innerHTML=d.map(p=>`
<tr>
<td>${p.nome}</td>
<td>${p.descricao}</td>
<td><button onclick="excluirPeca('${p._id}')">❌</button></td>
</tr>`).join('');
});
}

function excluirPeca(id){
fetch(`/pecas/${id}`,{method:'DELETE',headers:{Authorization:token}})
.then(()=>carregarPecas());
}

function logout(){
    localStorage.removeItem('token');
    location.href='/login';
}

carregarDashboard();
</script>

</body>
</html>
